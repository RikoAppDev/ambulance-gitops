apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: fd-ambulance-webapi

resources:
- 'https://github.com/RikoAppDev/ambulance-webapi//deployments/kustomize/install'
- openapi-ui.service.yaml
- http-route.yaml

patches:
- path: patches/ambulance-webapi.deployment.yaml

labels:
  - pairs:
      app.kubernetes.io/component: backend
      wac-fiit.github.io/component: backend
    includeSelectors: false
    includeTemplates: true

